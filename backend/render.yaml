databases:
  - name: dkfitt-db
    plan: free
    databaseName: dkfitt
    user: dkfitt

services:
  - type: web
    name: dkfitt-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: dkfitt-db
          property: connectionString
